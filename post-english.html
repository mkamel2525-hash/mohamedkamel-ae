<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dubai Creek Tower — English Post</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .post {
      position: relative;
      width: 540px;
      height: 960px;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* Background image */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('/root/.claude/uploads/c8f80e4c-35fd-5281-a7ef-0251c3e1dff9/f4de1ba7-1B6CBB941C2C4A8E9729858365B42CD1.png');
      background-size: cover;
      background-position: center;
    }

    /* Dark overlay to deepen contrast behind text */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.15) 45%,
        rgba(0,0,0,0.10) 60%,
        rgba(0,0,0,0.50) 100%
      );
    }

    /* Content stack */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 32px 0;
      gap: 20px;
    }

    /* Headline box */
    .headline-box {
      background: rgba(0,0,0,0.82);
      border-radius: 18px;
      padding: 22px 28px;
      text-align: center;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .headline-box .line1 {
      font-size: 30px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.25;
      letter-spacing: -0.5px;
    }

    .headline-box .line2 {
      font-size: 26px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.25;
      margin-top: 4px;
    }

    .fires {
      font-size: 28px;
      margin-top: 6px;
      line-height: 1;
    }

    /* Contact box */
    .contact-box {
      background: rgba(0,0,0,0.82);
      border-radius: 18px;
      padding: 18px 28px;
      text-align: center;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .contact-label {
      font-size: 15px;
      color: #CCCCCC;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .contact-label::before,
    .contact-label::after {
      content: '';
      display: inline-block;
      width: 36px;
      height: 1px;
      background: rgba(255,255,255,0.35);
    }

    .contact-phone {
      font-size: 26px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .phone-icon {
      width: 28px;
      height: 28px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .phone-icon svg {
      width: 15px;
      height: 15px;
      fill: white;
    }

    /* Launch box */
    .launch-box {
      background: rgba(0,0,0,0.82);
      border-radius: 18px;
      padding: 16px 28px;
      text-align: center;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .cal-icon {
      font-size: 26px;
      line-height: 1;
    }

    .launch-text {
      font-size: 24px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="content">

      <!-- Headline -->
      <div class="headline-box">
        <div class="line1">Invest at the World's</div>
        <div class="line2">Tallest Tower 🔥🔥🔥</div>
        <div class="line1" style="margin-top:6px; font-size:24px;">Dubai Creek Tower</div>
      </div>

      <!-- Contact -->
      <div class="contact-box">
        <div class="contact-label">If interested, contact us</div>
        <div class="contact-phone">
          <div class="phone-icon" aria-hidden="true">
            <!-- Phone SVG -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
            </svg>
          </div>
          +971 58 880 1766
        </div>
      </div>

      <!-- Launch -->
      <div class="launch-box">
        <span class="cal-icon">📅</span>
        <span class="launch-text">Launching in Days</span>
      </div>

    </div>
  </div>
</body>
</html>
