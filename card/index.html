<style>
  :root{
    --navy:#0e2038; --navy-2:#16335a; --navy-3:#1E3C63;
    --gold:#C9A96E; --gold-2:#E6CB92; --ink:#0b1726;
    --glass:rgba(255,255,255,.08); --line:rgba(201,169,110,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Montserrat',sans-serif;color:#f4efe8;
    background:var(--ink);overflow-x:hidden;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;
    padding:max(18px,env(safe-area-inset-top)) 16px max(18px,env(safe-area-inset-bottom));
  }

  /* ---------- Animated luxury background ---------- */
  .bg{position:fixed;inset:0;z-index:-3;overflow:hidden;background:
      radial-gradient(120% 120% at 50% 0%, #4a82c0 0%, #2a5a96 42%, #163b68 100%);}
  .bg::before,.bg::after{
    content:"";position:absolute;width:75vmax;height:75vmax;border-radius:50%;
    filter:blur(55px);opacity:.8;mix-blend-mode:screen;
  }
  .bg::before{background:radial-gradient(circle, rgba(230,203,146,.8), transparent 62%);
    top:-22vmax;left:-10vmax;animation:drift1 18s ease-in-out infinite alternate;}
  .bg::after{background:radial-gradient(circle, rgba(120,180,240,.85), transparent 62%);
    bottom:-25vmax;right:-15vmax;animation:drift2 22s ease-in-out infinite alternate;}
  @keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(18vmax,12vmax) scale(1.25)}}
  @keyframes drift2{from{transform:translate(0,0) scale(1)}to{transform:translate(-16vmax,-10vmax) scale(1.2)}}
  /* shimmering gold particles */
  .stars{position:fixed;inset:0;z-index:-2;}
  .stars i{position:absolute;display:block;width:3px;height:3px;border-radius:50%;
    background:var(--gold-2);opacity:.0;box-shadow:0 0 6px rgba(230,203,146,.8);
    animation:twinkle linear infinite;}
  @keyframes twinkle{0%{opacity:0;transform:translateY(0)}10%{opacity:.9}50%{opacity:.25}
    100%{opacity:0;transform:translateY(-40px)}}

  /* ---------- Card ---------- */
  .card{
    position:relative;z-index:1;width:min(420px,100%);
    background:linear-gradient(160deg, rgba(18,42,76,.62), rgba(10,26,48,.50));
    border:1px solid var(--line);border-radius:26px;
    backdrop-filter:blur(18px) saturate(130%);-webkit-backdrop-filter:blur(18px) saturate(130%);
    box-shadow:0 30px 80px -30px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.12);
    padding:30px 24px 26px;text-align:center;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both;
    overflow:hidden;
  }
  .card::after{ /* sweeping sheen */
    content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.14),transparent);
    transform:skewX(-18deg);animation:sheen 6.5s ease-in-out infinite;}
  @keyframes sheen{0%,72%{left:-60%}100%{left:130%}}
  @keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}

  .mono{display:inline-flex;align-items:center;justify-content:center;
    width:54px;height:54px;border:1.5px solid var(--gold);border-radius:12px;
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.5rem;color:var(--gold);
    letter-spacing:.04em;margin-bottom:14px;}
  .eyebrow{font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);opacity:.9;margin-bottom:16px;}

  .portrait{position:relative;width:128px;height:128px;margin:0 auto 14px;}
  .portrait .ring{position:absolute;inset:-6px;border-radius:50%;
    background:conic-gradient(from 0deg,var(--gold),var(--gold-2),#8c6f3e,var(--gold));
    animation:spin 9s linear infinite;}
  .portrait .ring::after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--navy);}
  @keyframes spin{to{transform:rotate(360deg)}}
  .portrait img{position:absolute;inset:6px;width:calc(100% - 12px);height:calc(100% - 12px);
    border-radius:50%;object-fit:cover;object-position:top center;z-index:1;
    background:#16335a;}
  .portrait .fallback{position:absolute;inset:6px;border-radius:50%;z-index:1;display:none;
    align-items:center;justify-content:center;background:linear-gradient(160deg,#1E3C63,#0e2038);
    font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:2.4rem;}
  .portrait img.is-broken{display:none;}
  .portrait img.is-broken + .fallback{display:flex;}

  h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:2.1rem;line-height:1.05;margin-bottom:4px;}
  .role{color:var(--gold-2);font-weight:500;font-size:.86rem;letter-spacing:.02em;}
  .sub{color:#cdd6e2;font-size:.74rem;margin-top:3px;}

  .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0 6px;}
  .chips span{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;
    border:1px solid var(--line);border-radius:40px;padding:5px 10px;color:#e8ddc6;background:rgba(201,169,110,.06);}
  .badge{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    font-size:.64rem;letter-spacing:.06em;color:var(--gold);}
  .badge svg{width:13px;height:13px;}

  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:18px 0 16px;}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 10px;border-radius:13px;font-size:.78rem;font-weight:600;letter-spacing:.04em;
    text-decoration:none;color:#f4efe8;border:1px solid var(--line);
    background:rgba(255,255,255,.05);transition:transform .2s ease,background .25s ease,border-color .25s ease;}
  .btn svg{width:18px;height:18px;flex:0 0 auto;}
  .btn:hover{transform:translateY(-2px);background:rgba(201,169,110,.14);border-color:var(--gold);}
  .btn:active{transform:translateY(0) scale(.98);}
  .btn--wide{grid-column:1/-1;}
  .btn--gold{background:linear-gradient(120deg,var(--gold),var(--gold-2));color:#3a2c12;border:0;font-weight:700;}
  .btn--gold:hover{background:linear-gradient(120deg,var(--gold-2),var(--gold));}
  .btn--wa{background:linear-gradient(120deg,#1faf54,#25D366);color:#06320f;border:0;font-weight:700;}
  .btn--wa:hover{filter:brightness(1.05);}

  .foot{margin-top:18px;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#8ea0b8;}
  a.web{color:var(--gold-2);text-decoration:none;font-weight:600;font-size:.82rem;}
  @media (max-width:360px){ h1{font-size:1.85rem} .btn{font-size:.72rem} }
</style>
</head>
<body>

<script>
  /* floating gold particles */
  (function(){
    var wrap=document.getElementById('stars'); if(!wrap) return;
    var n=window.innerWidth<420?16:26;
    for(var i=0;i<n;i++){
      var s=document.createElement('i');
      var left=(i*37+13)%100;            // deterministic spread (no Math.random needed)
      var dur=6+(i%7);
      var delay=(i%10)*0.8;
      s.style.left=left+'%';
      s.style.top=(8+(i*53)%88)+'%';
      s.style.animationDuration=dur+'s';
      s.style.animationDelay=delay+'s';
      wrap.appendChild(s);
    }
  })();

  /* Save Contact → downloads a vCard the phone offers to add */
  (function(){
    var vcard=[
      'BEGIN:VCARD','VERSION:3.0',
      'N:Ivanova;Viktoria;;;','FN:Viktoria Ivanova',
      'ORG:Deluxe Homes Real Estate',
      'TITLE:Dubai Luxury Property Advisor',
      'TEL;TYPE=CELL:+971588801766',
      'EMAIL;TYPE=WORK:Viktoria@Deluxehomes.ae',
      'URL:https://viktoriaivanova.ae',
      'ADR;TYPE=WORK:;;Office 701, Code Business Tower, Al Barsha 1;Dubai;;;United Arab Emirates',
      'NOTE:Off-Plan · Luxury · Secondary · Portfolio Management — RERA Certified',
      'END:VCARD'
    ].join('\n');
    var btn=document.getElementById('saveBtn');
    btn.addEventListener('click',function(e){
      e.preventDefault();
      var blob=new Blob([vcard],{type:'text/vcard'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download='Viktoria-Ivanova.vcf';
      document.body.appendChild(a); a.click();
      setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
    });
  })();
</script>
