<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --deep:#14424e; --petrol:#0c2b33; --teal:#17677a; --gold:#c6a15b; --gold-deep:#a9833f; --gold-soft:#e9d9b8;
         --tint:#eef7f8; --tint-2:#e4f1f2; --ink:#1d3d45; --soft:#5f7d84; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#494949;font-family:'Jost',sans-serif;display:flex;flex-direction:column;gap:40px;align-items:center;padding:40px;}
  .card{width:1050px;height:600px;position:relative;overflow:hidden;}

  /* ============ FRONT — photo on the RIGHT ============ */
  .front{background:#fdfefe;display:flex;}
  .front__content{flex:1;padding:56px 56px 48px;display:flex;flex-direction:column;position:relative;}
  .brand{display:flex;align-items:center;gap:18px;}
  .brand svg{width:66px;height:66px;flex:none;}
  .brand__name{font-family:'Playfair Display',serif;font-weight:700;font-size:40px;line-height:1;color:var(--deep);letter-spacing:.01em;}
  .brand__sub{font-size:14.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-deep);font-weight:600;margin-top:7px;}
  .divider{height:1.5px;background:linear-gradient(90deg,var(--gold) 0%,rgba(198,161,91,.15) 100%);margin-top:26px;}
  .who{margin-top:38px;}
  h1{font-family:'Playfair Display',serif;font-weight:600;font-size:56px;line-height:1.08;color:var(--deep);}
  .role{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;font-size:27px;color:var(--teal);margin-top:8px;}
  .svcline{font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);margin-top:12px;font-weight:500;max-width:30ch;line-height:1.6;}
  .contacts{margin-top:auto;display:flex;flex-direction:column;gap:13px;}
  .c{display:flex;align-items:center;gap:15px;font-size:22px;color:var(--ink);font-weight:600;}
  .c i{width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(198,161,91,.55);background:linear-gradient(160deg,#fff,var(--tint));
     display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 8px 18px -10px rgba(20,66,78,.4);}
  .c svg{width:19px;height:19px;stroke:var(--teal);fill:none;stroke-width:2;}
  /* photo panel right */
  .front__photo{position:relative;width:400px;height:100%;overflow:hidden;background:
     radial-gradient(85% 70% at 20% 6%, rgba(43,147,168,.4) 0%, transparent 55%),
     radial-gradient(60% 60% at 88% 96%, rgba(198,161,91,.3) 0%, transparent 55%),
     linear-gradient(205deg,#17677a 0%, #14424e 50%, #0c2b33 100%);}
  .arch{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:296px;height:508px;border-radius:296px 296px 0 0;overflow:hidden;
     background:linear-gradient(180deg,#e4f1f2,#fdfbf6);}
  .arch img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;}
  .archline{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:330px;height:540px;border-radius:330px 330px 0 0;
     border:1.5px solid rgba(233,217,184,.6);border-bottom:none;}

  /* ============ BACK ============ */
  .back{background:
     radial-gradient(80% 90% at 85% 8%, rgba(43,147,168,.35) 0%, transparent 55%),
     radial-gradient(60% 70% at 8% 96%, rgba(198,161,91,.28) 0%, transparent 55%),
     linear-gradient(155deg,#17677a 0%, #14424e 48%, #0c2b33 100%);
     display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;position:relative;}
  .blogo{width:120px;height:120px;border-radius:50%;border:1.5px solid var(--gold-soft);display:flex;align-items:center;justify-content:center;}
  .blogo svg{width:78px;height:78px;}
  .back h2{font-family:'Playfair Display',serif;font-weight:700;font-size:56px;margin-top:24px;letter-spacing:.01em;}
  .back .sub{font-size:16px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold-soft);margin-top:10px;font-weight:600;}
  .back .line{width:64px;height:1.5px;background:var(--gold);margin-top:26px;}
  .back .person{font-family:'Playfair Display',serif;font-size:26px;margin-top:24px;color:rgba(255,255,255,.95);}
  .back .person i{font-style:italic;color:var(--gold-soft);font-size:21px;display:block;margin-top:4px;}
  .back .web{font-size:20px;margin-top:22px;color:rgba(255,255,255,.9);font-weight:400;letter-spacing:.06em;}
</style></head><body>
